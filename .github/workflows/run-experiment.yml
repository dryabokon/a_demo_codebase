name: Run Experiment

on:
  push:
    branches: [ main ]

jobs:
  experiment:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - run: |
          uv sync --frozen
          .venv\Scripts\python src/main.py

      - name: Save run metadata
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $runInfo = @{
            run_id     = "${{ github.run_id }}"
            run_number = "${{ github.run_number }}"
            status     = "completed"
            branch     = "${{ github.ref }}"
            commit     = "${{ github.sha }}"
            timestamp  = Get-Date -Format "o"
          }
          $runInfo | ConvertTo-Json | Out-File -Encoding UTF8 run_metadata.json

      - name: Find latest run folder
        if: always()
        shell: pwsh
        run: |
          $latest = Get-ChildItem -Path runs/ -Directory |
            Sort-Object { [int]($_.Name -replace '\D','') } -Descending |
            Select-Object -First 1
          if ($latest) {
            $artifacts = Get-ChildItem -Path $latest.FullName -File
            $destination = Join-Path -Path "runs" -ChildPath "latest"
            mkdir $destination -Force
            foreach ($artifact in $artifacts) {
              Copy-Item -Path $artifact.FullName -Destination $destination -Force
            }
            echo "LATEST_RUN=latest" >> $env:GITHUB_ENV
          } else {
            echo "LATEST_RUN=runs/" >> $env:GITHUB_ENV
          }

      - name: Zip run metadata and run artifacts
        if: always()
        shell: pwsh
        run: |
          Compress-Archive -Path "runs/${{ env.LATEST_RUN }}/*", "run_metadata.json" -DestinationPath "results-${{ github.run_id }}.zip"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ github.run_id }}
          path: results-${{ github.run_id }}.zip
